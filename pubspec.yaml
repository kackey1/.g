name: clipus

description: A modern black and white social media app built with Flutter and Firebase.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.0
  firebase_core: ^2.15.1
  firebase_auth: ^4.8.1
  cloud_firestore: ^4.9.0
  firebase_storage: ^11.2.4
  emailjs_flutter: ^1.0.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/